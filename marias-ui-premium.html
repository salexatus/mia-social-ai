<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Maria's Viagens — UI premium</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Sora,system-ui,sans-serif}
:root{--brand-primary:#E84B8A}
body{min-height:100vh;display:flex;justify-content:center;
 background:radial-gradient(circle at 50% -6%,rgba(232,75,138,.18),transparent 42%),radial-gradient(circle at 92% 88%,rgba(155,93,229,.14),transparent 38%),linear-gradient(160deg,#0e0a12,#140d18 55%,#0c0910)}
.app{width:430px;max-width:100%;padding:0 22px 40px}
.app-header--premium{display:flex;flex-direction:column;align-items:center;gap:8px;padding:34px 16px 12px;text-align:center}
.brand-logo-lg{height:104px;width:auto;max-width:84%;object-fit:contain;filter:drop-shadow(0 8px 28px rgba(232,75,138,.3))}
.brand-name-lg{font-size:27px;font-weight:600;letter-spacing:-.3px;background:linear-gradient(90deg,var(--brand-primary),#d9a441);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-top:4px}
.brand-tag-lg{font-size:12px;letter-spacing:3.5px;text-transform:uppercase;color:rgba(255,255,255,.5);font-weight:500}
.stack{display:flex;flex-direction:column;gap:16px;margin-top:8px}
.field-glass{width:100%;min-height:140px;resize:vertical;border-radius:22px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(16px);box-shadow:inset 0 1px 0 rgba(255,255,255,.14),0 12px 34px rgba(0,0,0,.28);color:#fff;padding:18px 20px;font-size:16px;line-height:1.5;outline:none}
.field-glass::placeholder{color:rgba(255,255,255,.42)}
.field-glass:focus{border-color:var(--brand-primary);box-shadow:inset 0 1px 0 rgba(255,255,255,.16),0 0 0 4px rgba(232,75,138,.18),0 14px 40px rgba(232,75,138,.22)}
.tabs--premium{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tab--premium{height:54px;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);backdrop-filter:blur(10px);color:rgba(255,255,255,.85);font-weight:600;font-size:15px;cursor:pointer;transition:.2s}
.tab--premium:hover{transform:translateY(-1px);color:#fff}
.tab--premium.is-active{background:linear-gradient(135deg,var(--brand-primary),#9b5de5);border-color:transparent;color:#fff;box-shadow:0 8px 28px rgba(232,75,138,.35)}
.hero{display:flex;gap:12px}
.hero>div{flex:1;aspect-ratio:9/16;border-radius:18px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05)}
.cards-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.gen-btn{height:62px;border-radius:18px;border:none;cursor:pointer;font-size:17px;font-weight:700;letter-spacing:.4px;color:#fff;background:linear-gradient(135deg,var(--brand-primary),#9b5de5);box-shadow:0 10px 30px rgba(232,75,138,.32);transition:.2s}
.gen-btn:hover{transform:translateY(-2px);box-shadow:0 16px 42px rgba(232,75,138,.45);filter:brightness(1.05)}
</style></head>
<body><div class="app">
<header class="app-header--premium">
 <img class="brand-logo-lg" src="https://ik.imagekit.io/photoslide/uploads/logomarias_oA3-BK0wh.png" alt="Maria's Viagens"/>
 <span class="brand-name-lg">Maria's Viagens</span>
 <span class="brand-tag-lg">Social AI</span>
</header>
<section class="stack">
 <textarea class="field-glass" placeholder="Digite as informações da promoção ou divulgação..."></textarea>
 <div class="tabs--premium">
  <button class="tab--premium is-active">Promoção</button>
  <button class="tab--premium">Divulgação</button>
 </div>
 <div class="hero"><div></div><div></div><div></div></div>
 <div class="cards-2"><button class="gen-btn">STORY</button><button class="gen-btn">FEED</button></div>
</section>
</div></body></html>
